<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>H7 4璺?TOF 涓插彛鑱旇皟鍙?/title>
  <style>
    :root {
      --bg: #0c1117;
      --bg-alt: #111924;
      --panel: rgba(17, 25, 36, 0.86);
      --panel-strong: rgba(12, 17, 23, 0.94);
      --line: rgba(126, 176, 255, 0.16);
      --text: #edf4ff;
      --muted: #89a1b9;
      --cyan: #51e5ff;
      --amber: #ffb454;
      --red: #ff6b6b;
      --green: #67f0a9;
      --shadow: 0 22px 60px rgba(0, 0, 0, 0.45);
      --radius: 20px;
      --mono: "Cascadia Code", "Consolas", monospace;
      --ui: "Segoe UI Variable", "Bahnschrift", "Trebuchet MS", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--ui);
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(81, 229, 255, 0.16), transparent 28%),
        radial-gradient(circle at top right, rgba(255, 180, 84, 0.12), transparent 24%),
        linear-gradient(160deg, #091019 0%, #0f1824 45%, #0a0f16 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
      background-size: 32px 32px;
      mask-image: radial-gradient(circle at center, black 40%, transparent 92%);
    }

    .page {
      width: min(1320px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 28px 0 40px;
    }

    .hero,
    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      backdrop-filter: blur(14px);
      box-shadow: var(--shadow);
    }

    .hero {
      padding: 28px;
      display: grid;
      gap: 20px;
      overflow: hidden;
      position: relative;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: auto -80px -80px auto;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(81, 229, 255, 0.16), transparent 68%);
      pointer-events: none;
    }

    .hero-top {
      display: flex;
      gap: 18px;
      justify-content: space-between;
      align-items: flex-start;
      flex-wrap: wrap;
    }

    .eyebrow {
      display: inline-flex;
      padding: 6px 12px;
      border-radius: 999px;
      border: 1px solid rgba(81, 229, 255, 0.24);
      color: var(--cyan);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: rgba(81, 229, 255, 0.08);
    }

    h1 {
      margin: 12px 0 10px;
      font-size: clamp(28px, 4vw, 46px);
      line-height: 1;
      letter-spacing: 0.02em;
    }

    .subtitle {
      margin: 0;
      max-width: 780px;
      color: var(--muted);
      line-height: 1.6;
    }

    .hero-side {
      min-width: 260px;
      display: grid;
      gap: 12px;
    }

    .status-chip {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(12, 17, 23, 0.94);
      font-weight: 700;
    }

    .status-dot {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: var(--amber);
      box-shadow: 0 0 18px rgba(255, 180, 84, 0.6);
    }

    .status-dot.ok {
      background: var(--green);
      box-shadow: 0 0 18px rgba(103, 240, 169, 0.6);
    }

    .status-dot.bad {
      background: var(--red);
      box-shadow: 0 0 18px rgba(255, 107, 107, 0.7);
    }

    .control-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 14px;
      align-items: end;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    .field label {
      color: var(--muted);
      font-size: 13px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    select,
    button {
      appearance: none;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 14px;
      min-height: 48px;
      padding: 0 14px;
      font: inherit;
      color: var(--text);
      background: rgba(12, 17, 23, 0.94);
      transition: transform 140ms ease, border-color 140ms ease, background 140ms ease;
    }

    select:focus,
    button:focus {
      outline: none;
      border-color: rgba(81, 229, 255, 0.5);
      box-shadow: 0 0 0 3px rgba(81, 229, 255, 0.12);
    }

    button:hover:not(:disabled) {
      transform: translateY(-1px);
      border-color: rgba(81, 229, 255, 0.36);
    }

    button:disabled {
      opacity: 0.46;
      cursor: not-allowed;
    }

    .primary {
      background: linear-gradient(135deg, rgba(81, 229, 255, 0.18), rgba(81, 229, 255, 0.06));
      border-color: rgba(81, 229, 255, 0.24);
    }

    .danger {
      background: linear-gradient(135deg, rgba(255, 107, 107, 0.18), rgba(255, 107, 107, 0.06));
      border-color: rgba(255, 107, 107, 0.24);
    }

    .ghost {
      background: rgba(255, 255, 255, 0.02);
    }

    .notice {
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid rgba(255, 180, 84, 0.18);
      background: rgba(255, 180, 84, 0.08);
      color: #ffd39a;
      line-height: 1.6;
    }

    .grid {
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      gap: 18px;
      margin-top: 18px;
    }

    .left-stack,
    .right-stack {
      display: grid;
      gap: 18px;
    }

    .panel {
      padding: 20px;
    }

    .panel h2 {
      margin: 0 0 16px;
      font-size: 18px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
    }

    .stat-card,
    .sensor-card {
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 16px;
      background: rgba(8, 12, 18, 0.62);
      padding: 16px;
    }

    .stat-label,
    .sensor-meta {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .stat-value {
      margin-top: 10px;
      font-size: 24px;
      font-weight: 800;
    }

    .sensor-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .sensor-card {
      display: grid;
      gap: 14px;
      position: relative;
      overflow: hidden;
    }

    .sensor-card::after {
      content: "";
      position: absolute;
      inset: auto -30px -30px auto;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(81, 229, 255, 0.14), transparent 70%);
      pointer-events: none;
    }

    .sensor-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .sensor-title {
      margin: 0;
      font-size: 18px;
    }

    .badge {
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      background: rgba(255, 180, 84, 0.12);
      color: #ffd39a;
      border: 1px solid rgba(255, 180, 84, 0.22);
    }

    .badge.ok {
      background: rgba(103, 240, 169, 0.12);
      color: #c9ffe1;
      border-color: rgba(103, 240, 169, 0.22);
    }

    .badge.bad {
      background: rgba(255, 107, 107, 0.12);
      color: #ffd0d0;
      border-color: rgba(255, 107, 107, 0.22);
    }

    .distance {
      display: flex;
      align-items: baseline;
      gap: 10px;
    }

    .distance strong {
      font-size: clamp(30px, 6vw, 54px);
      line-height: 0.95;
      font-weight: 900;
      font-family: var(--mono);
      letter-spacing: -0.04em;
    }

    .distance span {
      color: var(--muted);
      font-size: 18px;
      font-weight: 700;
    }

    .sensor-foot {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .raw-log {
      border-radius: 16px;
      min-height: 280px;
      max-height: 480px;
      overflow: auto;
      margin: 0;
      padding: 14px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      background: #081018;
      color: #d7e5f4;
      font: 13px/1.55 var(--mono);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .log-line {
      display: block;
      padding: 2px 0;
    }

    .log-line.error {
      color: #ff9696;
    }

    .log-line.warn {
      color: #ffd39a;
    }

    .log-line.info {
      color: #91f1ff;
    }

    .protocol-list {
      margin: 0;
      padding-left: 18px;
      color: var(--muted);
      line-height: 1.7;
    }

    .protocol-list code,
    .inline-code {
      font-family: var(--mono);
      color: var(--text);
      background: rgba(255, 255, 255, 0.04);
      padding: 2px 6px;
      border-radius: 8px;
    }

    .subtle {
      color: var(--muted);
      line-height: 1.6;
    }

    @media (max-width: 980px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 760px) {
      .page {
        width: min(100vw - 20px, 1320px);
        padding-top: 18px;
      }

      .hero,
      .panel {
        padding: 16px;
      }

      .sensor-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="page">

  <script>
    const state = {
      port: null,
      reader: null,
      readLoopPromise: null,
      keepReading: false,
      decoder: new TextDecoder(),
      buffer: "",
      frameCount: 0,
      errorCount: 0,
      timestamps: [],
      logLines: [],
    };

    const els = {
      connectButton: document.getElementById("connectButton"),
      disconnectButton: document.getElementById("disconnectButton"),
      clearButton: document.getElementById("clearButton"),
      sampleButton: document.getElementById("sampleButton"),
      baudrate: document.getElementById("baudrate"),
      decoderMode: document.getElementById("decoderMode"),
      statusDot: document.getElementById("statusDot"),
      statusText: document.getElementById("statusText"),
      frameCount: document.getElementById("frameCount"),
      errorCount: document.getElementById("errorCount"),
      frameRate: document.getElementById("frameRate"),
      seqValue: document.getElementById("seqValue"),
      estopValue: document.getElementById("estopValue"),
      validMaskValue: document.getElementById("validMaskValue"),
      faultMaskValue: document.getElementById("faultMaskValue"),
      activeMaskValue: document.getElementById("activeMaskValue"),
      motionClassValue: document.getElementById("motionClassValue"),
      selfEstopValue: document.getElementById("selfEstopValue"),
      externalEstopValue: document.getElementById("externalEstopValue"),
      lastUpdateValue: document.getElementById("lastUpdateValue"),
      rawLog: document.getElementById("rawLog"),
    };

    const sensorEls = [1, 2, 3, 4].map((index) => ({
      badge: document.getElementById(`tof${index}Badge`),
      distance: document.getElementById(`tof${index}Distance`),
      meters: document.getElementById(`tof${index}Meters`),
      state: document.getElementById(`tof${index}State`),
    }));

    function setConnectionState(kind, text) {
      els.statusDot.className = "status-dot";
      if (kind === "ok") {
        els.statusDot.classList.add("ok");
      } else if (kind === "bad") {
        els.statusDot.classList.add("bad");
      }
      els.statusText.textContent = text;
    }

    function escapeHtml(value) {
      return value
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }

    function appendLog(message, type = "info") {
      const time = new Date().toLocaleTimeString();
      state.logLines.push({ time, message, type });
      state.logLines = state.logLines.slice(-200);
      els.rawLog.innerHTML = state.logLines
        .map((entry) => `<span class="log-line ${entry.type}">[${entry.time}] ${escapeHtml(entry.message)}</span>`)
        .join("");
      els.rawLog.scrollTop = els.rawLog.scrollHeight;
    }

    function updateCounters() {
      els.frameCount.textContent = String(state.frameCount);
      els.errorCount.textContent = String(state.errorCount);
    }

    function updateFrameRate() {
      const now = Date.now();
      state.timestamps = state.timestamps.filter((item) => now - item < 5000);
      if (state.timestamps.length < 2) {
        els.frameRate.textContent = "0.0 Hz";
        return;
      }
      const span = (state.timestamps[state.timestamps.length - 1] - state.timestamps[0]) / 1000;
      const rate = span > 0 ? (state.timestamps.length - 1) / span : 0;
      els.frameRate.textContent = `${rate.toFixed(1)} Hz`;
    }

    function formatMask(value) {
      if (value == null || Number.isNaN(value)) {
        return "0x00";
      }
      return `0x${value.toString(16).toUpperCase().padStart(2, "0")}`;
    }

    function formatDistance(value) {
      if (value == null || Number.isNaN(value) || value < 0 || value >= 65535) {
        return "--";
      }
      return String(value);
    }

    function formatMeters(value) {
      if (value == null || Number.isNaN(value) || value < 0 || value >= 65535) {
        return "--";
      }
      return `${(value / 1000).toFixed(3)} m`;
    }

    function formatMotionClass(value) {
      switch (value) {
        case 0:
          return "IDLE";
        case 1:
          return "FWD";
        case 2:
          return "REV";
        case 3:
          return "TURN";
        case 4:
          return "STRAFE";
        case 5:
          return "MIXED";
        case 6:
          return "LINK_LOSS";
        default:
          return "--";
      }
    }

    function setSensorCard(index, distance, validMask, faultMask) {
      const valid = ((validMask >> index) & 0x01) === 1;
      const fault = ((faultMask >> index) & 0x01) === 1;
      const sensor = sensorEls[index];

      sensor.distance.textContent = formatDistance(distance);
      sensor.meters.textContent = formatMeters(distance);

      let text = "绛夊緟鏁版嵁";
      let badgeClass = "badge";

      if (valid && !fault) {
        text = "鏈夋晥";
        badgeClass = "badge ok";
      } else if (valid && fault) {
        text = "鏁呴殰";
        badgeClass = "badge bad";
      } else if (!valid && fault) {
        text = "鏃犳晥/鏁呴殰";
        badgeClass = "badge bad";
      } else if (!valid) {
        text = "鏃犳晥";
      }

      sensor.badge.className = badgeClass;
      sensor.badge.textContent = text;
      sensor.state.textContent = text;
    }

    function updateDashboard(frame) {
      state.frameCount += 1;
      state.timestamps.push(Date.now());
      updateCounters();
      updateFrameRate();

      els.seqValue.textContent = String(frame.seq ?? "--");
      els.estopValue.textContent = String(frame.estop ?? 0);
      els.validMaskValue.textContent = formatMask(frame.validMask);
      els.faultMaskValue.textContent = formatMask(frame.faultMask);
      els.activeMaskValue.textContent = formatMask(frame.activeMask);
      els.motionClassValue.textContent = formatMotionClass(frame.motionClass);
      els.selfEstopValue.textContent = String(frame.selfEstop ?? 0);
      els.externalEstopValue.textContent = String(frame.externalEstop ?? 0);
      els.lastUpdateValue.textContent = new Date().toLocaleTimeString();

      for (let i = 0; i < 4; i += 1) {
        setSensorCard(i, frame.tof[i], frame.validMask, frame.faultMask);
      }

      if (frame.estop === 1) {
        setConnectionState("bad", "涓插彛鍦ㄧ嚎 / 鎬ュ仠瑙﹀彂");
      } else {
        setConnectionState("ok", "涓插彛鍦ㄧ嚎 / 姝ｅ父鏀跺抚");
      }
    }

    function parseInteger(value) {
      const raw = String(value).trim();
      if (!raw) {
        return null;
      }
      if (raw.toLowerCase().startsWith("0x")) {
        return Number.parseInt(raw, 16);
      }
      if (/[a-f]/i.test(raw)) {
        return Number.parseInt(raw, 16);
      }
      return Number.parseInt(raw, 10);
    }

    function xorChecksum(payload) {
      let checksum = 0;
      for (const ch of payload) {
        checksum ^= ch.charCodeAt(0);
      }
      return checksum;
    }

    function parseH7TofLine(line) {
      const trimmed = line.trim();
      const clean = trimmed.startsWith("$") ? trimmed.slice(1) : trimmed;
      const starIndex = clean.indexOf("*");

      let payload = clean;
      let checksumText = null;
      if (starIndex >= 0) {
        payload = clean.slice(0, starIndex);
        checksumText = clean.slice(starIndex + 1).trim();
      }

      const parts = payload.split(",").map((item) => item.trim());
      if (parts.length < 9) {
        throw new Error("瀛楁鏁伴噺涓嶈冻");
      }
      if (parts[0] !== "H7TOF" && parts[0] !== "TOF") {
        throw new Error("甯уご涓嶅尮閰?);
      }

      if (checksumText) {
        const expected = Number.parseInt(checksumText, 16);
        const actual = xorChecksum(payload);
        if (expected !== actual) {
          throw new Error(`checksum 澶辫触: ${actual.toString(16).toUpperCase()} != ${checksumText.toUpperCase()}`);
        }
      }

      return {
        seq: parseInteger(parts[1]) ?? 0,
        tof: [
          parseInteger(parts[2]) ?? 65535,
          parseInteger(parts[3]) ?? 65535,
          parseInteger(parts[4]) ?? 65535,
          parseInteger(parts[5]) ?? 65535,
        ],
        estop: parseInteger(parts[6]) ?? 0,
        validMask: parseInteger(parts[7]) ?? 0,
        faultMask: parseInteger(parts[8]) ?? 0,
        activeMask: parseInteger(parts.find((item) => item.startsWith("A="))?.slice(2)) ?? 0,
        motionClass: parseInteger(parts.find((item) => item.startsWith("M="))?.slice(2)) ?? 6,
        selfEstop: parseInteger(parts.find((item) => item.startsWith("SE="))?.slice(3)) ?? 0,
        externalEstop: parseInteger(parts.find((item) => item.startsWith("EE="))?.slice(3)) ?? 0,
      };
    }

    function parseJsonLine(line) {
      const obj = JSON.parse(line);
      const tofArray = Array.isArray(obj.tof)
        ? obj.tof
        : [obj.tof1_mm, obj.tof2_mm, obj.tof3_mm, obj.tof4_mm];

      if (!Array.isArray(tofArray) || tofArray.length < 4) {
        throw new Error("JSON 缂哄皯 tof 鏁扮粍");
      }

      return {
        seq: parseInteger(obj.seq) ?? 0,
        tof: tofArray.slice(0, 4).map((item) => parseInteger(item) ?? 65535),
        estop: parseInteger(obj.estop) ?? 0,
        validMask: parseInteger(obj.valid_mask ?? obj.validMask) ?? 0,
        faultMask: parseInteger(obj.fault_mask ?? obj.faultMask) ?? 0,
        activeMask: parseInteger(obj.active_mask ?? obj.activeMask) ?? 0,
        motionClass: parseInteger(obj.motion_class ?? obj.motionClass) ?? 6,
        selfEstop: parseInteger(obj.self_estop ?? obj.selfEstop) ?? 0,
        externalEstop: parseInteger(obj.external_estop ?? obj.externalEstop) ?? 0,
      };
    }

    function parseFrame(line) {
      const mode = els.decoderMode.value;
      if (mode === "json") {
        return parseJsonLine(line);
      }
      if (mode === "h7tof") {
        return parseH7TofLine(line);
      }

      const text = line.trim();
      if (!text) {
        throw new Error("绌鸿");
      }
      if (text.startsWith("{")) {
        return parseJsonLine(text);
      }
      return parseH7TofLine(text);
    }

    function handleLine(line) {
      const text = line.trim();
      if (!text) {
        return;
      }

      appendLog(text, "info");

      try {
        const frame = parseFrame(text);
        updateDashboard(frame);
      } catch (error) {
        state.errorCount += 1;
        updateCounters();
        appendLog(`瑙ｆ瀽澶辫触: ${error.message}`, "error");
      }
    }

    function consumeBuffer(chunk) {
      state.buffer += chunk;
      const lines = state.buffer.split(/\r\n|[\r\n]/);
      state.buffer = lines.pop() ?? "";
      for (const line of lines) {
        handleLine(line);
      }
    }

    async function disconnectSerial() {
      state.keepReading = false;

      if (state.reader) {
        try {
          await state.reader.cancel();
        } catch (error) {
          appendLog(`reader cancel 澶辫触: ${error.message}`, "warn");
        }
      }

      if (state.readLoopPromise) {
        try {
          await state.readLoopPromise;
        } catch (error) {
          appendLog(`read loop 閫€鍑哄紓甯? ${error.message}`, "warn");
        }
      }

      if (state.port) {
        try {
          await state.port.close();
        } catch (error) {
          appendLog(`port close 澶辫触: ${error.message}`, "warn");
        }
      }

      state.reader = null;
      state.readLoopPromise = null;
      state.port = null;
      els.connectButton.disabled = false;
      els.disconnectButton.disabled = true;
      setConnectionState("", "鏈繛鎺?);
      appendLog("涓插彛宸叉柇寮€", "warn");
    }

    async function readLoop() {
      if (!state.port || !state.port.readable) {
        return;
      }

      state.reader = state.port.readable.getReader();

      try {
        while (state.keepReading) {
          const { value, done } = await state.reader.read();
          if (done) {
            break;
          }
          if (value) {
            consumeBuffer(state.decoder.decode(value, { stream: true }));
          }
        }
      } catch (error) {
        if (state.keepReading) {
          state.errorCount += 1;
          updateCounters();
          appendLog(`涓插彛璇诲彇澶辫触: ${error.message}`, "error");
          setConnectionState("bad", "璇诲彇寮傚父");
        }
      } finally {
        if (state.reader) {
          state.reader.releaseLock();
        }
        state.reader = null;
        state.readLoopPromise = null;
      }
    }

    async function connectSerial() {
      if (!("serial" in navigator)) {
        appendLog("褰撳墠娴忚鍣ㄤ笉鏀寔 Web Serial", "error");
        setConnectionState("bad", "娴忚鍣ㄤ笉鏀寔 Web Serial");
        return;
      }

      if (!window.isSecureContext) {
        appendLog("褰撳墠椤甸潰涓嶆槸瀹夊叏涓婁笅鏂囷紝璇锋敼鐢?http://localhost 鎵撳紑", "error");
        setConnectionState("bad", "璇风敤 localhost 鎵撳紑鏈〉");
        return;
      }

      try {
        const port = await navigator.serial.requestPort();
        const baudrate = Number.parseInt(els.baudrate.value, 10);

        await port.open({
          baudRate: baudrate,
          dataBits: 8,
          stopBits: 1,
          parity: "none",
          bufferSize: 4096,
          flowControl: "none",
        });

        state.port = port;
        state.keepReading = true;
        els.connectButton.disabled = true;
        els.disconnectButton.disabled = false;
        setConnectionState("", "涓插彛宸叉墦寮€锛岀瓑寰呴甯?);
        appendLog(`涓插彛宸茶繛鎺ワ紝baud=${baudrate}`, "info");
        state.readLoopPromise = readLoop();
      } catch (error) {
        appendLog(`杩炴帴涓插彛澶辫触: ${error.message}`, "error");
        setConnectionState("bad", "杩炴帴澶辫触");
      }
    }

    function resetDashboard() {
      state.frameCount = 0;
      state.errorCount = 0;
      state.timestamps = [];
      state.buffer = "";
      updateCounters();
      updateFrameRate();
      els.seqValue.textContent = "--";
      els.estopValue.textContent = "0";
      els.validMaskValue.textContent = "0x00";
      els.faultMaskValue.textContent = "0x00";
      els.activeMaskValue.textContent = "0x00";
      els.motionClassValue.textContent = "LINK";
      els.selfEstopValue.textContent = "0";
      els.externalEstopValue.textContent = "0";
      els.lastUpdateValue.textContent = "--";

      for (const sensor of sensorEls) {
        sensor.badge.className = "badge";
        sensor.badge.textContent = "绛夊緟鏁版嵁";
        sensor.distance.textContent = "--";
        sensor.meters.textContent = "--";
        sensor.state.textContent = "鏃犲抚";
      }
    }

    function injectSampleFrame() {
      handleLine("$H7TOF,17,523,518,65535,521,0,0B,04,R=10/10/10/10,F=3/3/3/3,S=0/0/0/0,C=0/0/0/0,E=0/0/0/0,L=FF/FF/FF/FF,A=09,M=1,SE=0,EE=0*3A");
      appendLog("宸叉敞鍏ョず渚嬪抚", "warn");
    }

    els.connectButton.addEventListener("click", connectSerial);
    els.disconnectButton.addEventListener("click", disconnectSerial);
    els.sampleButton.addEventListener("click", injectSampleFrame);
    els.clearButton.addEventListener("click", () => {
      state.logLines = [];
      els.rawLog.innerHTML = "";
      resetDashboard();
      appendLog("鏃ュ織鍜岄〉闈㈢姸鎬佸凡娓呯┖", "warn");
    });

    if ("serial" in navigator) {
      navigator.serial.addEventListener("disconnect", () => {
        appendLog("妫€娴嬪埌涓插彛璁惧鏂紑", "warn");
        disconnectSerial();
      });
    }

    resetDashboard();
    appendLog("椤甸潰宸插姞杞姐€傝嫢娴忚鍣ㄦ彁绀轰笉鏀寔锛岃鏀圭敤 Edge/Chrome锛屽苟閫氳繃 http://localhost 鎵撳紑銆?, "info");
  </script>
</body>
</html>
